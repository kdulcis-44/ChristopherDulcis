---
layout: default
---
<style>
  .post-list { list-style: none; }
  .post-list li {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    padding: 1.1rem 0;
    border-bottom: 1px solid var(--border);
  }
  .post-list li:first-child { border-top: 1px solid var(--border); }
  .post-date {
    font-size: 0.85rem;
    color: var(--muted);
    white-space: nowrap;
    min-width: 90px;
  }
  .post-link {
    font-size: 1.05rem;
    font-weight: 500;
  }
  .empty-state {
    color: var(--muted);
    font-size: 0.95rem;
    padding: 2rem 0;
  }
</style>

<ul class="post-list">
  {% for post in site.posts %}
  <li>
    <span class="post-date">{{ post.date | date: "%-d %b %Y" }}</span>
    <a class="post-link" href="{{ post.url }}">{{ post.title }}</a>
  </li>
  {% else %}
  <li class="empty-state">Brak wpisów. Dodaj pierwszy post do folderu <code>_posts</code>.</li>
  {% endfor %}
</ul>
