<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #888;
      --accent: #1a1a1a;
      --border: #e8e8e8;
      --max-width: 680px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Georgia, serif;
      background: var(--bg);
      color: var(--text);
      font-size: 18px;
      line-height: 1.7;
      padding: 0 1.5rem;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2.5rem 0 2rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    header .site-name {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header nav a {
      font-size: 0.9rem;
      color: var(--muted);
      margin-left: 1.5rem;
    }

    header nav a:hover { color: var(--text); text-decoration: none; }

    main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 3rem 0 5rem;
    }

    footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <a class="site-name" href="/">{{ site.title }}</a>
    <nav>
      <a href="/">Wpisy</a>
      <a href="/about">O blogu</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    &copy; {{ site.time | date: "%Y" }} {{ site.author }}
  </footer>
</body>
</html>
