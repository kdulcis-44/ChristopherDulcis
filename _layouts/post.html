---
layout: default
---
<style>
  .post-header { margin-bottom: 2.5rem; }
  .post-title {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.03em;
    margin-bottom: 0.6rem;
  }
  .post-meta { font-size: 0.88rem; color: var(--muted); }
  .post-content { margin-top: 2rem; }
  .post-content h2 { font-size: 1.35rem; margin: 2.5rem 0 0.75rem; letter-spacing: -0.02em; }
  .post-content h3 { font-size: 1.1rem; margin: 2rem 0 0.5rem; }
  .post-content p { margin-bottom: 1.4rem; }
  .post-content ul, .post-content ol { margin: 0 0 1.4rem 1.5rem; }
  .post-content li { margin-bottom: 0.3rem; }
  .post-content blockquote {
    border-left: 3px solid var(--border);
    margin: 1.5rem 0;
    padding: 0.5rem 0 0.5rem 1.2rem;
    color: var(--muted);
    font-style: italic;
  }
  .post-content code {
    font-family: "SFMono-Regular", Consolas, monospace;
    font-size: 0.85em;
    background: #f5f5f5;
    padding: 0.15em 0.4em;
    border-radius: 3px;
  }
  .post-content pre {
    background: #f5f5f5;
    padding: 1.2rem;
    border-radius: 6px;
    overflow-x: auto;
    margin-bottom: 1.4rem;
  }
  .post-content pre code { background: none; padding: 0; }
  .post-content img { max-width: 100%; border-radius: 4px; margin: 1rem 0; }
  .back-link { display: inline-block; margin-top: 3rem; font-size: 0.9rem; color: var(--muted); }
  .back-link:hover { color: var(--text); text-decoration: none; }
</style>

<article>
  <div class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date: "%-d %B %Y" }}</div>
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</article>

<a class="back-link" href="/">← Wszystkie wpisy</a>
